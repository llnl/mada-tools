name: Python CI

on: [pull_request]

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure CHANGELOG.md was updated
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          if git diff --name-only "origin/${{ github.event.pull_request.base.ref }}" HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated"
          else
            echo "Please update CHANGELOG.md."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[tests,docs]'
          pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[tests,docs]'

      - name: Run unit tests
        run: pytest -m "unit and not allocation_required" tests/

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[tests,docs]'

      - name: Run integration tests
        run: pytest -m "integration and not allocation_required" tests/

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[tests,docs]'

      - name: Run e2e tests
        run: pytest -m "e2e and not allocation_required" tests/
