name: CI

on: [pull_request]

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure CHANGELOG.md was updated
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          if git diff --name-only "origin/${{ github.event.pull_request.base.ref }}" HEAD | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated"
          else
            echo "Please update CHANGELOG.md."
            exit 1
          fi

  lint:
    uses: ./.github/workflows/test-job.yml
    with:
      python-version: 3.x
      test-name: "linter"
      test-command: "pre-commit run --all-files"

  unit:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    uses: ./.github/workflows/test-job.yml
    with:
      python-version: ${{ matrix.python-version }}
      test-name: "unit"
      test-command: 'pytest -m "unit and not allocation_required" tests/'

  integration:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    uses: ./.github/workflows/test-job.yml
    with:
      python-version: ${{ matrix.python-version }}
      test-name: "integration"
      test-command: 'pytest -m "integration and not allocation_required" tests/'

  e2e:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    uses: ./.github/workflows/test-job.yml
    with:
      python-version: ${{ matrix.python-version }}
      test-name: "e2e"
      test-command: 'pytest -m "e2e and not allocation_required" tests/'
