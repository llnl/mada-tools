spec:
  inputs:
    zone_extends:
      type: array
      description: Zone-specific parents

---

variables:
  PYTHON_IMAGE: python:3.13  # install_mada_tools needs this variable


# Just test the build process
# We don't ever build the actual docs in GitLab since we deploy from GitHub actions instead
pages_test:
  stage: test
  extends:
    - .install_mada_tools
    - .retry_settings
    - $[[ inputs.zone_extends ]]
  script:
    - echo "The site would be deployed to $CI_PAGES_URL"
    - mkdocs build --strict --verbose --site-dir doc_build_test
  artifacts:
    paths:
      - doc_build_test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
