spec:
  inputs:
    zone_extends:
      type: array
      description: Zone-specific parents
---

integration_tests:
  stage: test
  extends:
    - .install_mada_tools
    - .python_matrix
    - .retry_settings
    - $[[ inputs.zone_extends ]]
  script:
    - pytest tests/ -m "integration and not (allocation_required or requires_gitlab_runner)"

integration_tests_requires_gitlab_runner:
  stage: test
  extends:
    - .install_mada_tools_runner
    - .retry_settings
    - $[[ inputs.zone_extends ]]
  script:
    - pytest tests/ -m "integration and requires_gitlab_runner and not (allocation_required)" -vv
